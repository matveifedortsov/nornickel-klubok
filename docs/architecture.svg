<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 470" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0A2540"/>
    </marker>
  </defs>
  <style>
    .box { fill: #ffffff; stroke: #0072CE; stroke-width: 1.6; rx: 8; }
    .store { fill: #EAF3FB; stroke: #0A2540; stroke-width: 1.6; }
    .lane { fill: none; stroke: #C7D6E5; stroke-dasharray: 5 5; }
    .t { fill: #0A2540; font-size: 14px; }
    .ts { fill: #5B7186; font-size: 11px; }
    .lanehdr { fill: #0072CE; font-size: 13px; font-weight: bold; }
    .arrow { stroke: #0A2540; stroke-width: 1.6; fill: none; marker-end: url(#arr); }
  </style>

  <text x="20" y="28" font-size="18" font-weight="bold" fill="#0A2540">«Научный клубок» — архитектура</text>
  <text x="20" y="47" class="ts">LLM/эмбеддер-агностично: бэкенды меняются одной строкой в .env (mock · YandexGPT · MetalGPT-1 on-prem · fastembed)</text>

  <!-- ИНЖЕСТ -->
  <rect x="20" y="65" width="940" height="120" class="lane" rx="10"/>
  <text x="32" y="86" class="lanehdr">ИНЖЕСТ</text>

  <rect x="40" y="100" width="150" height="60" class="box" rx="8"/>
  <text x="58" y="126" class="t">Документы</text>
  <text x="58" y="144" class="ts">PDF · DOCX · PPTX</text>

  <rect x="240" y="100" width="150" height="60" class="box" rx="8"/>
  <text x="256" y="126" class="t">Парсинг + чанки</text>
  <text x="256" y="144" class="ts">+ авторство из имени</text>

  <rect x="440" y="100" width="180" height="60" class="box" rx="8"/>
  <text x="456" y="120" class="t">Извлечение (LLM)</text>
  <text x="456" y="136" class="ts">триплеты + числа + гео</text>
  <text x="456" y="151" class="ts">фильтр по онтологии · кэш</text>

  <rect x="680" y="90" width="130" height="38" class="store" rx="8"/>
  <text x="696" y="114" class="t">Neo4j · граф</text>
  <rect x="680" y="138" width="130" height="38" class="store" rx="8"/>
  <text x="696" y="162" class="t">Qdrant · векторы</text>

  <rect x="850" y="90" width="110" height="86" class="box" rx="8"/>
  <text x="864" y="115" class="t">Онтология</text>
  <text x="864" y="133" class="ts">12 типов узлов</text>
  <text x="864" y="148" class="ts">верификация</text>
  <text x="864" y="163" class="ts">версии фактов</text>

  <line x1="190" y1="130" x2="238" y2="130" class="arrow"/>
  <line x1="390" y1="130" x2="438" y2="130" class="arrow"/>
  <line x1="620" y1="115" x2="678" y2="109" class="arrow"/>
  <line x1="620" y1="145" x2="678" y2="157" class="arrow"/>
  <line x1="848" y1="133" x2="812" y2="133" class="arrow"/>

  <!-- ЗАПРОС -->
  <rect x="20" y="205" width="940" height="150" class="lane" rx="10"/>
  <text x="32" y="226" class="lanehdr">ЗАПРОС (0.1–2.6 с — бюджет ТЗ 3–5 с)</text>

  <rect x="40" y="245" width="140" height="60" class="box" rx="8"/>
  <text x="56" y="270" class="t">Вопрос (RU/EN)</text>
  <text x="56" y="288" class="ts">естественный язык</text>

  <rect x="220" y="245" width="150" height="60" class="box" rx="8"/>
  <text x="236" y="265" class="t">Фильтры</text>
  <text x="236" y="282" class="ts">числа · гео РФ/мир</text>
  <text x="236" y="296" class="ts">годы · домен</text>

  <rect x="410" y="230" width="170" height="42" class="box" rx="8"/>
  <text x="424" y="248" class="t">Векторный recall</text>
  <text x="424" y="263" class="ts">fastembed, локально</text>
  <rect x="410" y="282" width="170" height="42" class="box" rx="8"/>
  <text x="424" y="300" class="t">Seed-узлы</text>
  <text x="424" y="315" class="ts">fulltext Neo4j</text>

  <rect x="620" y="245" width="160" height="60" class="box" rx="8"/>
  <text x="634" y="265" class="t">Обход 1–4 хопа</text>
  <text x="634" y="282" class="ts">APOC + фильтры в Cypher</text>
  <text x="634" y="296" class="ts">реранк рёбер (локально)</text>

  <rect x="820" y="245" width="140" height="60" class="box" rx="8"/>
  <text x="834" y="265" class="t">Ответ + цитаты</text>
  <text x="834" y="282" class="ts">верификация · подграф</text>
  <text x="834" y="296" class="ts">экспорт PDF/MD/JSON-LD</text>

  <line x1="180" y1="275" x2="218" y2="275" class="arrow"/>
  <line x1="370" y1="275" x2="408" y2="251" class="arrow"/>
  <line x1="370" y1="275" x2="408" y2="303" class="arrow"/>
  <line x1="580" y1="251" x2="618" y2="266" class="arrow"/>
  <line x1="580" y1="303" x2="618" y2="288" class="arrow"/>
  <line x1="780" y1="275" x2="818" y2="275" class="arrow"/>

  <!-- Обвязка -->
  <rect x="20" y="375" width="940" height="75" class="lane" rx="10"/>
  <text x="32" y="396" class="lanehdr">ДОСТУП И АНАЛИТИКА</text>
  <text x="40" y="424" class="t">FastAPI: /ask · /review · /subgraph · /gaps · /compare · /experts · /dashboard · /export · /watch</text>
  <text x="40" y="442" class="ts">RBAC по X-API-Key (5 ролей) · аудит запросов · Streamlit UI · Docker Compose · seed-автозагрузка для демо</text>
</svg>
